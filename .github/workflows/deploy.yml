name: Deploy artoflynn.codewithsky.co.ke

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # 2. Load SSH key
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
    
      # 3 Debug secrets
      - name: Debug secrets presence
        run: |
          echo "HOST set: ${{ secrets.SSH_HOST != '' }}"
          echo "PORT set: ${{ secrets.SSH_PORT != '' }}"

      # 4. Add server fingerprint
      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      # # 5. Test SSH connection
      # - name: SSH Test
      #   run: |
      #     ssh -T -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} exit

      # 6. Deployment commands
      - name: Deploy codewithsky
        run: |
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'EOF'
            set -e
                
            export GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519_artoflynn -o StrictHostKeyChecking=no"
                
            mkdir -p ~/artoflynn.codewithsky.co.ke
            cd ~/artoflynn.codewithsky.co.ke
                
            if [ ! -d ".git" ]; then
                git init
                git remote add origin git@github.com:Bkimking/artorlynn.git
                git fetch origin
                git checkout -f main
            else
                git fetch origin
                git reset --hard origin/main
            fi
                
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan optimize:clear
            php artisan optimize
                
            echo "Deployment complete"
          EOF
          